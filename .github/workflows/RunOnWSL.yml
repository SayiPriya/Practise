name: Run On WSL

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release folder name (e.g. 2026.06)"
        required: true
        type: string

jobs:
  prepare-release:
    runs-on: self-hosted

    steps:
      - name: Initialize / Update Release Repo
        id: clone_repo
        shell: powershell
        run: |
          $ver = "${{ github.event.inputs.release_version }}"
          echo "RELEASE_VERSION=$ver" >> $env:GITHUB_OUTPUT

          $OutputEncoding = [System.Text.UTF8Encoding]::new($false)

          $bashScript = @'
          set -e

          cd ~/src

          if [ ! -d "__VER__" ]; then
            echo '>>> Directory does not exist. Cloning fresh repository...'
            git clone git@github.com:Allplan-GmbH/SDS2Prod-sds2.git "__VER__"
            cd "__VER__"
            echo '>>> Initializing submodules...'
            git submodule update --init --recursive
          else
            echo '>>> Directory exists. Performing advanced update...'
            cd "__VER__"

            if [ ! -d .git ]; then
              echo 'ERROR: Directory exists but is not a git repository!'
              exit 1
            fi

            echo '>>> Fetching latest changes...'
            git fetch --all

           fi
          '@ -replace '__VER__', $ver -replace "`r`n", "`n"

          echo ">>> Bash script to execute:`n$bashScript"
          $bashScript | wsl.exe bash -l

      - name: Verify clone location
        id: verify
        shell: powershell
        run: |
          $ver = "${{ steps.clone_repo.outputs.RELEASE_VERSION }}"

          $OutputEncoding = [System.Text.UTF8Encoding]::new($false)

          $bashScript = @'
          echo 'Contents of ~/src:'
          ls -al ~/src
          echo ''
          echo "Contents of ~/src/__VER__:"
          chmod g+w ~/src/__VER__
          ls -al ~/src/__VER__
          '@ -replace '__VER__', $ver -replace "`r`n", "`n"

          echo ">>> Bash script to execute:`n$bashScript"
          $bashScript | wsl.exe bash -l
